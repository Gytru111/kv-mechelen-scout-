<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FM26 Scout — Rapport de recrutement</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
/* ── TOKENS ── */
:root {
  --bg:       #080C12;
  --s1:       #0D1320;
  --s2:       #111C2E;
  --s3:       #172238;
  --s4:       #1E2D44;
  --border:   rgba(255,255,255,.07);
  --border2:  rgba(255,255,255,.13);
  --t1:       #EDF2FF;
  --t2:       #7B93B4;
  --t3:       #3D5470;
  --green:    #00D46A;
  --green2:   #00FF80;
  --green3:   rgba(0,212,106,.1);
  --gold:     #F5C518;
  --gold2:    rgba(245,197,24,.12);
  --red:      #FF4C6A;
  --red2:     rgba(255,76,106,.1);
  --blu:      #4D9EFF;
  --blu2:     rgba(77,158,255,.1);
  --pur:      #A78BFA;
  --r:        10px;
  --r2:       14px;
}

*{box-sizing:border-box;margin:0;padding:0}
html{height:100%}
body{background:var(--bg);color:var(--t1);font-family:'Inter',sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden}

/* NOISE TEXTURE */
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.025;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
  background-size:128px}

/* GLOW BG */
body::after{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 70% 40% at 15% 0%, rgba(0,212,106,.06) 0%, transparent 55%),
    radial-gradient(ellipse 50% 30% at 85% 100%, rgba(77,158,255,.05) 0%, transparent 50%)}

/* ── LAYOUT ── */
.app{display:flex;height:100vh;position:relative;z-index:1}

/* SIDEBAR */
.sidebar{width:260px;flex-shrink:0;background:var(--s1);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;transition:.3s}
.sidebar-head{padding:1.25rem 1.25rem 1rem;border-bottom:1px solid var(--border);flex-shrink:0}
.logo{display:flex;align-items:center;gap:.6rem;margin-bottom:.9rem}
.logo-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--green),var(--blu));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.9rem;font-weight:700;color:#000;font-family:'Syne',sans-serif;flex-shrink:0}
.logo-text{font-family:'Syne',sans-serif;font-size:.95rem;font-weight:800;letter-spacing:-.02em}
.logo-text span{color:var(--green)}
.logo-sub{font-size:.58rem;color:var(--t3);letter-spacing:.15em;text-transform:uppercase;margin-top:1px}
.scout-season{background:var(--s2);border:1px solid var(--border);border-radius:var(--r);padding:.55rem .75rem;display:flex;align-items:center;justify-content:space-between}
.scout-season-lbl{font-size:.65rem;color:var(--t3);text-transform:uppercase;letter-spacing:.1em}
.scout-season-val{font-family:'Syne',sans-serif;font-size:.85rem;font-weight:700;color:var(--green)}

.sidebar-filters{flex:1;overflow-y:auto;padding:1rem 1.25rem;display:flex;flex-direction:column;gap:1rem}
.sidebar-filters::-webkit-scrollbar{width:3px}
.sidebar-filters::-webkit-scrollbar-thumb{background:var(--s4);border-radius:3px}

.filter-group{}
.fg-label{font-size:.6rem;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.12em;margin-bottom:.5rem;display:flex;align-items:center;gap:.4rem}
.fg-label::after{content:'';flex:1;height:1px;background:var(--border)}

.fsel{width:100%;background:var(--s2);border:1px solid var(--border);border-radius:var(--r);padding:.48rem .75rem;color:var(--t1);font-size:.8rem;font-family:'Inter',sans-serif;outline:none;cursor:pointer;transition:.2s}
.fsel:focus{border-color:var(--green);box-shadow:0 0 0 2px rgba(0,212,106,.1)}

.range-row{display:flex;align-items:center;gap:.5rem;font-size:.75rem;color:var(--t2)}
.range-row span{width:28px;text-align:center;font-family:'JetBrains Mono',monospace;font-size:.72rem;color:var(--green);flex-shrink:0}
.frange{flex:1;-webkit-appearance:none;appearance:none;height:3px;background:var(--s4);border-radius:3px;outline:none;cursor:pointer}
.frange::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--green);cursor:pointer;box-shadow:0 0 8px rgba(0,212,106,.4)}
.frange::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:var(--green);cursor:pointer;border:none}

.pos-pills{display:flex;flex-wrap:wrap;gap:.3rem}
.ppill{padding:.2rem .55rem;border-radius:5px;border:1px solid var(--border);background:transparent;color:var(--t3);font-size:.68rem;font-weight:600;cursor:pointer;transition:.15s;font-family:'Inter',sans-serif}
.ppill:hover{border-color:var(--border2);color:var(--t2)}
.ppill.on{border-color:var(--green);background:var(--green3);color:var(--green)}

.sidebar-footer{padding:.85rem 1.25rem;border-top:1px solid var(--border);flex-shrink:0}
.btn-reset{width:100%;padding:.45rem;background:var(--s3);border:1px solid var(--border);border-radius:var(--r);color:var(--t2);font-size:.75rem;font-family:'Inter',sans-serif;cursor:pointer;transition:.15s}
.btn-reset:hover{border-color:var(--border2);color:var(--t1)}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* TOPBAR */
.topbar{background:rgba(8,12,18,.85);border-bottom:1px solid var(--border);padding:.75rem 1.5rem;display:flex;align-items:center;gap:1rem;flex-shrink:0;backdrop-filter:blur(12px)}
.search-wrap{position:relative;flex:1;max-width:360px}
.search-wrap svg{position:absolute;left:.75rem;top:50%;transform:translateY(-50%);opacity:.35;pointer-events:none}
.sinp{width:100%;background:var(--s2);border:1px solid var(--border);border-radius:var(--r);padding:.48rem .75rem .48rem 2.2rem;color:var(--t1);font-size:.85rem;font-family:'Inter',sans-serif;outline:none;transition:.2s}
.sinp:focus{border-color:var(--green);box-shadow:0 0 0 2px rgba(0,212,106,.08)}
.sinp::placeholder{color:var(--t3)}
.topbar-right{display:flex;align-items:center;gap:.6rem;margin-left:auto}
.sort-sel{background:var(--s2);border:1px solid var(--border);border-radius:var(--r);padding:.42rem .75rem;color:var(--t1);font-size:.78rem;font-family:'Inter',sans-serif;outline:none;cursor:pointer}
.view-btns{display:flex;gap:.25rem}
.vbtn{width:30px;height:30px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--t3);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:.8rem;transition:.15s}
.vbtn.on,.vbtn:hover{background:var(--s3);border-color:var(--border2);color:var(--t1)}
.count-badge{background:var(--s2);border:1px solid var(--border);border-radius:7px;padding:.3rem .65rem;font-size:.72rem;color:var(--t2);font-family:'JetBrains Mono',monospace;white-space:nowrap}
.count-badge b{color:var(--green)}

/* CARDS AREA */
.cards-area{flex:1;overflow-y:auto;padding:1.25rem 1.5rem 3rem}
.cards-area::-webkit-scrollbar{width:4px}
.cards-area::-webkit-scrollbar-thumb{background:var(--s4);border-radius:4px}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:.75rem}
.grid.list{grid-template-columns:1fr}

/* PLAYER CARD */
.card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;cursor:pointer;transition:.2s;position:relative}
.card:hover{border-color:rgba(0,212,106,.25);transform:translateY(-2px);box-shadow:0 12px 32px rgba(0,0,0,.4),0 0 0 1px rgba(0,212,106,.08)}
.card-stripe{position:absolute;top:0;left:0;right:0;height:2px}

/* CARD HEADER */
.card-head{padding:.85rem 1rem .6rem;display:flex;gap:.7rem;align-items:flex-start}
.c-av{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0;border:2px solid;position:relative}
.c-av-flag{position:absolute;bottom:-2px;right:-3px;font-size:.65rem;background:var(--s1);border-radius:50%;padding:0 1px;line-height:1.2}
.c-info{flex:1;min-width:0}
.c-name{font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-.01em}
.c-club{font-size:.7rem;color:var(--t2);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.c-pos-line{display:flex;gap:.3rem;margin-top:.4rem;flex-wrap:wrap}
.pos-tag{padding:.14rem .48rem;border-radius:4px;font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.pos-GK{background:rgba(77,158,255,.15);color:#4D9EFF;border:1px solid rgba(77,158,255,.2)}
.pos-DEF{background:rgba(0,212,106,.12);color:#00D46A;border:1px solid rgba(0,212,106,.2)}
.pos-MID{background:rgba(245,197,24,.12);color:#F5C518;border:1px solid rgba(245,197,24,.2)}
.pos-ATT{background:rgba(255,76,106,.12);color:#FF4C6A;border:1px solid rgba(255,76,106,.2)}
.val-tag{padding:.14rem .48rem;border-radius:4px;font-size:.6rem;font-weight:600;background:var(--s3);color:var(--t2);border:1px solid var(--border)}
.val-free{background:rgba(0,212,106,.1);color:var(--green);border-color:rgba(0,212,106,.2)}

/* SCOUT RATING */
.c-rating-row{padding:.1rem 1rem .55rem;display:flex;align-items:center;gap:.6rem}
.c-rating-lbl{font-size:.6rem;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;width:56px;flex-shrink:0}
.c-rating-bar{flex:1;height:3px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden}
.c-rating-fill{height:3px;border-radius:2px;transition:width .8s cubic-bezier(.4,0,.2,1)}
.c-rating-val{font-family:'JetBrains Mono',monospace;font-size:.72rem;font-weight:600;min-width:22px;text-align:right}

/* MINI RADAR placeholder */
.c-radar-wrap{padding:0 1rem .6rem;display:flex;align-items:center;gap:.75rem}
.mini-radar{flex-shrink:0}
.c-stats-mini{display:grid;grid-template-columns:1fr 1fr;gap:.18rem .5rem;flex:1}
.smi{display:flex;align-items:center;justify-content:space-between;font-size:.62rem}
.smi-l{color:var(--t3)}
.smi-v{font-family:'JetBrains Mono',monospace;font-weight:600}

/* CARD FOOTER */
.card-foot{padding:.5rem 1rem .65rem;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:.5rem}
.c-age{font-size:.7rem;color:var(--t2)}
.c-age b{color:var(--t1);font-family:'Syne',sans-serif}
.c-pa-block{text-align:right}
.c-pa-v{font-family:'Syne',sans-serif;font-size:1.35rem;font-weight:800;line-height:1;letter-spacing:-.03em}
.c-pa-l{font-size:.58rem;color:var(--t3);margin-top:0}
.c-foot-mid{display:flex;flex-direction:column;align-items:center;gap:.15rem}
.c-wage{font-size:.65rem;color:var(--t3)}
.c-wage b{color:var(--t2)}
.c-contract{font-size:.6rem;color:var(--t3)}
.rand-dot{width:6px;height:6px;border-radius:50%;background:var(--pur);display:inline-block;margin-left:3px;vertical-align:middle}

/* LIST VIEW */
.grid.list .card{border-radius:var(--r)}
.grid.list .card-head{padding:.6rem 1rem}
.grid.list .c-av{width:36px;height:36px;font-size:1rem}
.grid.list .c-name{font-size:.88rem}
.grid.list .c-radar-wrap{padding:0 1rem .4rem}

/* EMPTY */
.empty{grid-column:1/-1;text-align:center;padding:4rem 1rem;color:var(--t3)}
.empty h3{font-family:'Syne',sans-serif;font-size:1.1rem;margin-bottom:.4rem;color:var(--t2)}

/* ── DETAIL PANEL ── */
.panel-bg{position:fixed;inset:0;z-index:400;background:rgba(0,0,0,.7);backdrop-filter:blur(10px);display:none;align-items:flex-start;justify-content:flex-end}
.panel-bg.on{display:flex}
.panel{width:min(560px,100vw);height:100vh;background:var(--s1);border-left:1px solid var(--border);overflow-y:auto;animation:slideIn .28s cubic-bezier(.4,0,.2,1)}
.panel::-webkit-scrollbar{width:4px}
.panel::-webkit-scrollbar-thumb{background:var(--s4);border-radius:4px}
@keyframes slideIn{from{transform:translateX(30px);opacity:0}to{transform:none;opacity:1}}

.panel-top{padding:1.25rem 1.5rem 1rem;border-bottom:1px solid var(--border);display:flex;gap:1rem;align-items:flex-start;position:sticky;top:0;background:var(--s1);z-index:10}
.panel-av{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:2rem;border:2.5px solid;flex-shrink:0;position:relative}
.panel-flag{position:absolute;bottom:-2px;right:-3px;font-size:.9rem;background:var(--s1);border-radius:50%;padding:0 2px}
.panel-hinfo{flex:1}
.panel-name{font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:800;letter-spacing:-.03em;line-height:1.1}
.panel-sub{font-size:.78rem;color:var(--t2);margin-top:3px}
.panel-tags{display:flex;gap:.3rem;margin-top:.5rem;flex-wrap:wrap}
.panel-close{background:var(--s3);border:1px solid var(--border);border-radius:8px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--t2);font-size:1rem;flex-shrink:0;transition:.15s}
.panel-close:hover{color:var(--t1);border-color:var(--border2)}

.panel-body{padding:1.25rem 1.5rem 2rem}

/* SCORES ROW */
.scores-row{display:grid;grid-template-columns:repeat(4,1fr);gap:.5rem;margin-bottom:1.25rem}
.score-cell{background:var(--s2);border:1px solid var(--border);border-radius:var(--r);padding:.65rem .75rem;text-align:center}
.score-cell-v{font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:800;line-height:1;letter-spacing:-.03em}
.score-cell-l{font-size:.58rem;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;margin-top:2px}

/* RADAR SVG */
.radar-section{background:var(--s2);border:1px solid var(--border);border-radius:var(--r2);padding:1.1rem 1rem;margin-bottom:1rem;display:flex;gap:1.25rem;align-items:center}
.radar-svg-wrap{flex-shrink:0}
.radar-legend{display:flex;flex-direction:column;gap:.35rem;flex:1}
.rl-row{display:flex;align-items:center;gap:.5rem}
.rl-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.rl-lbl{font-size:.7rem;color:var(--t2);flex:1}
.rl-val{font-family:'JetBrains Mono',monospace;font-size:.72rem;font-weight:600}

/* ATTRS GRID */
.attrs-grid{display:grid;grid-template-columns:1fr 1fr;gap:.4rem;margin-bottom:1rem}
.attr-cell{background:var(--s2);border:1px solid var(--border);border-radius:var(--r);padding:.55rem .75rem}
.attr-lbl{font-size:.62rem;color:var(--t3);margin-bottom:.3rem}
.attr-bar-bg{height:4px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden;margin-bottom:.2rem}
.attr-bar-fill{height:4px;border-radius:2px}
.attr-val{font-family:'JetBrains Mono',monospace;font-size:.72rem;font-weight:600}

/* INFO TABLE */
.info-table{background:var(--s2);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;margin-bottom:1rem}
.it-row{display:flex;align-items:center;justify-content:space-between;padding:.55rem .9rem;border-bottom:1px solid var(--border)}
.it-row:last-child{border-bottom:none}
.it-lbl{font-size:.72rem;color:var(--t3)}
.it-val{font-size:.78rem;font-weight:600;color:var(--t1);text-align:right}

/* SCOUT REPORT */
.scout-report{background:var(--s2);border:1px solid var(--border);border-radius:var(--r2);padding:1rem 1.1rem;margin-bottom:1rem}
.sr-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.65rem}
.sr-icon{font-size:.9rem}
.sr-title{font-size:.75rem;font-weight:700;color:var(--t1);text-transform:uppercase;letter-spacing:.06em}
.sr-text{font-size:.8rem;color:var(--t2);line-height:1.7}

/* TIP BOX */
.tip-box{background:rgba(245,197,24,.05);border:1px solid rgba(245,197,24,.18);border-radius:var(--r);padding:.7rem .9rem;font-size:.78rem;color:var(--gold);line-height:1.6;display:flex;gap:.5rem;margin-bottom:1rem}

/* NOTE AREA */
.note-section{background:var(--s2);border:1px solid var(--border);border-radius:var(--r2);padding:1rem 1.1rem}
.note-header{font-size:.62rem;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:.5rem}
.note-ta{width:100%;background:var(--s3);border:1px solid var(--border);border-radius:var(--r);padding:.6rem .75rem;color:var(--t1);font-size:.8rem;font-family:'Inter',sans-serif;outline:none;resize:vertical;min-height:70px;transition:.2s;line-height:1.6}
.note-ta:focus{border-color:var(--green);box-shadow:0 0 0 2px rgba(0,212,106,.08)}
.note-ta::placeholder{color:var(--t3)}
.note-foot{display:flex;justify-content:flex-end;margin-top:.4rem}
.btn-save{background:var(--green3);border:1px solid rgba(0,212,106,.25);color:var(--green);border-radius:7px;padding:.3rem .75rem;font-size:.72rem;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:.15s}
.btn-save:hover{background:var(--green);color:#000}

/* INTEREST BAR */
.interest-row{display:flex;align-items:center;gap:.6rem;margin-top:.75rem}
.interest-lbl{font-size:.65rem;color:var(--t3);width:80px;flex-shrink:0}
.int-opts{display:flex;gap:.3rem;flex:1}
.int-opt{padding:.2rem .55rem;border-radius:5px;border:1px solid var(--border);background:transparent;color:var(--t3);font-size:.65rem;font-weight:600;cursor:pointer;transition:.15s}
.int-opt:hover{border-color:var(--border2);color:var(--t2)}
.int-opt.sel-watch{border-color:var(--blu);background:var(--blu2);color:var(--blu)}
.int-opt.sel-target{border-color:var(--gold);background:var(--gold2);color:var(--gold)}
.int-opt.sel-sign{border-color:var(--green);background:var(--green3);color:var(--green)}
.int-opt.sel-pass{border-color:var(--red);background:var(--red2);color:var(--red)}

/* COMPARISON */
.compare-bar{position:fixed;bottom:0;left:260px;right:0;background:rgba(8,12,18,.95);border-top:1px solid var(--border);backdrop-filter:blur(12px);padding:.75rem 1.5rem;display:none;align-items:center;gap:1rem;z-index:300}
.compare-bar.on{display:flex}
.cmp-slots{display:flex;gap:.5rem;flex:1}
.cmp-slot{background:var(--s2);border:1px solid var(--border);border-radius:var(--r);padding:.35rem .75rem;font-size:.75rem;color:var(--t2);min-width:120px;display:flex;align-items:center;justify-content:space-between;gap:.5rem}
.cmp-slot.filled{border-color:var(--green);color:var(--t1)}
.cmp-x{color:var(--t3);cursor:pointer;font-size:.8rem;line-height:1}
.cmp-x:hover{color:var(--red)}
.btn-cmp{background:linear-gradient(135deg,var(--green),var(--blu));color:#000;font-weight:700;border:none;border-radius:var(--r);padding:.45rem 1.1rem;font-size:.8rem;cursor:pointer;font-family:'Syne',sans-serif;flex-shrink:0}

/* ANIMATIONS */
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@keyframes barIn{from{width:0!important}}
.card{animation:fadeUp .3s ease both}

/* MOBILE */
@media(max-width:768px){
  .sidebar{position:fixed;left:-260px;z-index:200;height:100%;transition:.25s}
  .sidebar.open{left:0;box-shadow:0 0 40px rgba(0,0,0,.6)}
  .main{width:100%}
  .compare-bar{left:0}
  .panel{width:100vw}
  .evo-cards{flex-direction:column}
  .stats-table{font-size:.7rem}
}

/* FM25/FM26 EVOLUTION SECTION */
.section-title{font-size:.62rem;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:.5rem;margin-top:.5rem}
.evo-cards{display:flex;gap:.75rem;margin-bottom:1rem}
.evo-card{flex:1;background:var(--s2);border:1px solid var(--border);border-radius:var(--r2);padding:.85rem;position:relative;overflow:hidden}
.evo-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.evo-card.fm25::before{background:linear-gradient(90deg,var(--t3),var(--t3))}
.evo-card.fm26::before{background:linear-gradient(90deg,var(--green),var(--blu))}
.evo-card-label{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:.6rem;display:flex;align-items:center;gap:.4rem}
.evo-card.fm25 .evo-card-label{color:var(--t3)}

function paColor(pa){if(pa>=75)return'#00D46A';if(pa>=65)return'#4D9EFF';if(pa>=55)return'#F5C518';return'#7B93B4';}
function barColor(v){if(v>=68)return'#00D46A';if(v>=55)return'#4D9EFF';if(v>=44)return'#F5C518';return'#FF4C6A';}
function emo(pos){if(pos==='GK')return'🧤';if(pos==='DEF')return'🛡️';if(pos==='MID')return'🎯';return'⚡';}

// Radar SVG
function drawRadar(attrs,size,stroke,bg){
  var keys=Object.keys(attrs);
  var vals=keys.map(function(k){return attrs[k]/100;});
  var n=keys.length;
  var cx=size/2,cy=size/2,r=(size/2)*0.72;
  var pts=vals.map(function(v,i){
    var a=(Math.PI*2/n)*i - Math.PI/2;
    return [cx+Math.cos(a)*r*v, cy+Math.sin(a)*r*v];
  });
  var bgPts=Array.from({length:n},function(_,i){
    var a=(Math.PI*2/n)*i - Math.PI/2;
    return [cx+Math.cos(a)*r, cy+Math.sin(a)*r];
  });
  // grid rings
  var rings='';
  [0.25,0.5,0.75,1].forEach(function(s){
    var rp=bgPts.map(function(p){return [(p[0]-cx)*s+cx,(p[1]-cy)*s+cy];});
    rings+='<polygon points="'+rp.map(function(p){return p.join(',');}).join(' ')+'" fill="none" stroke="'+bg+'" stroke-width="0.5"/>';
  });
  // axis lines
  var axes=bgPts.map(function(p){return '<line x1="'+cx+'" y1="'+cy+'" x2="'+p[0]+'" y2="'+p[1]+'" stroke="'+bg+'" stroke-width="0.5"/>';}).join('');
  // data area
  var area='<polygon points="'+pts.map(function(p){return p.join(',');}).join(' ')+'" fill="'+stroke.replace(')',',0.18)').replace('rgb(','rgba(').replace('#','').split('').map(function(_,i,a){return i===0?'rgba('+parseInt(a[0]+a[1],16)+','+parseInt(a[2]+a[3],16)+','+parseInt(a[4]+a[5],16)+',0.18)':''}).filter(Boolean)[0] +'" stroke="'+stroke+'" stroke-width="1.5" fill-opacity="0.15"/>';
  // Fallback simpler fill
  var fillColor=stroke==='#00D46A'?'rgba(0,212,106,0.12)':stroke==='#4D9EFF'?'rgba(77,158,255,0.12)':'rgba(245,197,24,0.12)';
  area='<polygon points="'+pts.map(function(p){return p.join(',');}).join(' ')+'" fill="'+fillColor+'" stroke="'+stroke+'" stroke-width="1.5"/>';
  // dots
  var dots=pts.map(function(p){return '<circle cx="'+p[0]+'" cy="'+p[1]+'" r="2" fill="'+stroke+'"/>';}).join('');
  return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'">'+rings+axes+area+dots+'</svg>';
}

// ── RENDER ──
function render(){
  var q=document.getElementById('srch').value.toLowerCase();
  var sort=document.getElementById('sort-sel').value;
  var d=DATA.filter(function(p){
    if(filterPos!=='all'&&p.pos!==filterPos)return false;
    if(filterNat!=='all'&&p.nat!==filterNat)return false;
    if(filterFoot!=='all'&&p.foot!==filterFoot)return false;
    if(p.age>filterAge)return false;
    if(p.pa<filterPa)return false;
    if(p.valNum>filterVal)return false;
    var pi=interests[p.id]||'';
    if(filterInt!=='all'&&pi!==filterInt)return false;
    if(q&&![p.name,p.club,p.nat].some(function(s){return s.toLowerCase().indexOf(q)>=0;}))return false;
    return true;
  });
  if(sort==='pa')d.sort(function(a,b){return b.pa-a.pa;});
  else if(sort==='ca')d.sort(function(a,b){return b.ca-a.ca;});
  else if(sort==='age')d.sort(function(a,b){return a.age-b.age;});
  else if(sort==='val')d.sort(function(a,b){return a.valNum-b.valNum;});
  else d.sort(function(a,b){return a.name.localeCompare(b.name);});
  document.getElementById('cnt').textContent=d.length;
  var g=document.getElementById('grid');
  g.className='grid'+(viewMode==='list'?' list':'');
  if(!d.length){g.innerHTML='<div class="empty"><h3>Aucun joueur trouvé</h3><p>Modifiez vos filtres de recherche.</p></div>';return;}
  g.innerHTML=d.map(function(p,i){return cardHTML(p,i);}).join('');
}

document.getElementById('sort-sel').addEventListener('change',render);
document.getElementById('nat-sel').addEventListener('change',function(){filterNat=this.value;render();});
document.getElementById('val-sel').addEventListener('change',function(){filterVal=parseInt(this.value);render();});
document.getElementById('int-sel').addEventListener('change',function(){filterInt=this.value;render();});
document.getElementById('foot-sel').addEventListener('change',function(){filterFoot=this.value;render();});
document.getElementById('age-range').addEventListener('input',function(){filterAge=parseInt(this.value);document.getElementById('age-lbl').textContent=this.value;render();});
document.getElementById('pa-range').addEventListener('input',function(){filterPa=parseInt(this.value);document.getElementById('pa-lbl').textContent=this.value;render();});

function resetFilters(){
  filterPos='all';filterNat='all';filterFoot='all';filterInt='all';filterAge=35;filterPa=0;filterVal=999999999;
  document.getElementById('srch').value='';
  document.getElementById('sort-sel').value='pa';
  document.getElementById('nat-sel').value='all';
  document.getElementById('val-sel').value='999999999';
  document.getElementById('int-sel').value='all';
  document.getElementById('foot-sel').value='all';
  document.getElementById('age-range').value=35;document.getElementById('age-lbl').textContent=35;
  document.getElementById('pa-range').value=0;document.getElementById('pa-lbl').textContent=0;
  document.querySelectorAll('.ppill').forEach(function(p){p.classList.remove('on');});
  document.querySelector('.ppill[data-pos="all"]').classList.add('on');
  render();
}

function setView(v){
  viewMode=v;
  document.getElementById('vg').classList.toggle('on',v==='grid');
  document.getElementById('vl').classList.toggle('on',v==='list');
  render();
}

// compare
function clearCompare(){compareList=[];document.getElementById('cmp-bar').classList.remove('on');}
function openCompare(){if(compareList.length<2)return;alert('Comparaison : '+compareList.map(function(id){return DATA[id].name;}).join(' vs '));}

document.addEventListener('keydown',function(e){if(e.key==='Escape')closePanel();});

populateNations();
render();
</script>
</body>
</html>
