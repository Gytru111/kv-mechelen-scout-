<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;
  --surface:#161b22;
  --surface2:#1c2128;
  --border:#30363d;
  --border2:#484f58;
  --t1:#e6edf3;
  --t2:#8b949e;
  --t3:#484f58;
  --gold:#f0a828;
  --grn:#3fb950;
  --blu:#58a6ff;
  --pur:#bc8cff;
  --red:#f85149;
  --r:10px;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--t1);font-family:'Inter',sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 80% 50% at 20% 0%,rgba(88,166,255,.06),transparent 60%),
             radial-gradient(ellipse 60% 40% at 80% 100%,rgba(240,168,40,.05),transparent 55%)}

/* HEADER */
.hdr{position:sticky;top:0;z-index:100;background:rgba(13,17,23,.9);border-bottom:1px solid var(--border);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)}
.hdr-inner{max-width:1200px;margin:0 auto;padding:.9rem 1.5rem;display:flex;align-items:center;gap:1rem;flex-wrap:wrap}
.hdr-logo{font-size:1.6rem;line-height:1}
.hdr-text h1{font-size:1.15rem;font-weight:700;letter-spacing:-.02em}
.hdr-text p{font-size:.7rem;color:var(--t2);margin-top:1px}
.hdr-badge{margin-left:auto;background:rgba(240,168,40,.12);color:var(--gold);
  border:1px solid rgba(240,168,40,.25);border-radius:20px;padding:.25rem .8rem;font-size:.72rem;font-weight:600}

/* CONTROLS */
.controls{max-width:1200px;margin:1.25rem auto 0;padding:0 1.5rem}
.ctrl-row{display:flex;gap:.5rem;flex-wrap:wrap;align-items:center;margin-bottom:.75rem}
.sinp{padding:.45rem .85rem;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
  color:var(--t1);font-size:.85rem;font-family:'Inter',sans-serif;outline:none;transition:.2s;flex:1;min-width:160px;max-width:280px}
.sinp:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(240,168,40,.1)}
.ssel{padding:.45rem .85rem;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
  color:var(--t1);font-size:.8rem;font-family:'Inter',sans-serif;cursor:pointer;outline:none}
.ssel:focus{border-color:var(--gold)}

/* PILLS */
.pills{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:1rem}
.pill{padding:.28rem .85rem;border-radius:20px;border:1px solid var(--border);background:var(--surface);
  color:var(--t2);font-size:.75rem;font-weight:500;cursor:pointer;transition:.15s;white-space:nowrap}
.pill:hover{border-color:var(--border2);color:var(--t1)}
.pill.on{background:rgba(240,168,40,.12);color:var(--gold);border-color:rgba(240,168,40,.3);font-weight:600}

/* COUNT */
.count-lbl{font-size:.75rem;color:var(--t3);margin-bottom:.85rem}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:.75rem;padding-bottom:3rem}

/* CARD */
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;
  cursor:pointer;transition:.18s;position:relative}
.card:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.card-accent{position:absolute;top:0;left:0;right:0;height:3px;border-radius:14px 14px 0 0}

.card-top{padding:.9rem 1rem .65rem;display:flex;gap:.75rem;align-items:flex-start}
.card-av{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:1.35rem;flex-shrink:0;border:2px solid}
.card-info{flex:1;min-width:0}
.card-name{font-size:.95rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-.01em}
.card-sub{font-size:.72rem;color:var(--t2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-badges{display:flex;gap:.3rem;margin-top:.45rem;flex-wrap:wrap}
.badge{padding:.18rem .55rem;border-radius:5px;font-size:.65rem;font-weight:600;white-space:nowrap}
.b-GK{background:rgba(88,166,255,.12);color:#58a6ff;border:1px solid rgba(88,166,255,.2)}
.b-DEF{background:rgba(63,185,80,.12);color:#3fb950;border:1px solid rgba(63,185,80,.2)}
.b-MID{background:rgba(240,168,40,.12);color:#f0a828;border:1px solid rgba(240,168,40,.2)}
.b-ATT{background:rgba(248,81,73,.12);color:#f85149;border:1px solid rgba(248,81,73,.2)}
.b-val{background:var(--surface2);color:var(--t2);border:1px solid var(--border)}
.b-free{background:rgba(63,185,80,.12);color:#3fb950;border:1px solid rgba(63,185,80,.2)}
.b-rand{background:rgba(188,140,255,.1);color:#bc8cff;border:1px solid rgba(188,140,255,.2)}

.card-pa{text-align:right;flex-shrink:0}
.card-pa-v{font-size:1.5rem;font-weight:800;line-height:1;letter-spacing:-.03em}
.card-pa-l{font-size:.6rem;color:var(--t3);margin-top:1px}
.card-pa-age{font-size:.72rem;color:var(--t2);margin-top:3px}

/* BARS */
.card-bars{padding:.3rem 1rem .75rem;display:grid;grid-template-columns:1fr 1fr;gap:.3rem .75rem}
.bar-row{display:flex;align-items:center;gap:.45rem}
.bar-lbl{font-size:.62rem;color:var(--t3);width:48px;flex-shrink:0}
.bar-bg{flex:1;height:4px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden}
.bar-fill{height:4px;border-radius:2px;transition:width .6s ease}
.bar-val{font-size:.72rem;font-weight:600;min-width:20px;text-align:right}

/* CARD FOOTER */
.card-foot{padding:.55rem 1rem .7rem;border-top:1px solid var(--border)}
.card-tip{font-size:.72rem;color:var(--t2);line-height:1.5;font-style:italic}

/* MODAL */
.modal-bg{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;padding:1rem}
.modal-bg.on{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:18px;
  max-width:500px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,.5)}
.modal::-webkit-scrollbar{width:4px}
.modal::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}

.modal-head{padding:1.25rem 1.25rem .9rem;display:flex;gap:.85rem;align-items:flex-start;border-bottom:1px solid var(--border)}
.modal-av{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.8rem;border:2px solid;flex-shrink:0}
.modal-hinfo{flex:1}
.modal-name{font-size:1.2rem;font-weight:700;letter-spacing:-.02em}
.modal-sub{font-size:.75rem;color:var(--t2);margin-top:2px}
.modal-hdg{display:flex;gap:.3rem;margin-top:.5rem;flex-wrap:wrap}
.modal-close{background:none;border:none;color:var(--t2);font-size:1.2rem;cursor:pointer;padding:.2rem .4rem;line-height:1;flex-shrink:0;border-radius:6px;transition:.15s}
.modal-close:hover{background:var(--surface2);color:var(--t1)}

.modal-body{padding:1rem 1.25rem 1.5rem}
.sec-t{font-size:.65rem;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.1em;margin:.9rem 0 .5rem}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:.4rem}
.info-cell{background:var(--surface2);border-radius:8px;padding:.5rem .7rem}
.info-lbl{font-size:.65rem;color:var(--t3)}
.info-val{font-size:.88rem;font-weight:600;margin-top:2px}
.modal-bars{display:flex;flex-direction:column;gap:.4rem}
.mbar-row{display:flex;align-items:center;gap:.75rem}
.mbar-lbl{font-size:.78rem;color:var(--t2);width:72px;flex-shrink:0}
.mbar-bg{flex:1;height:5px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden}
.mbar-fill{height:5px;border-radius:3px}
.mbar-val{font-size:.78rem;font-weight:600;min-width:22px;text-align:right}
.desc-box{background:var(--surface2);border-radius:8px;padding:.75rem .9rem;font-size:.82rem;color:var(--t2);line-height:1.65}
.tip-box{background:rgba(240,168,40,.06);border:1px solid rgba(240,168,40,.18);border-radius:8px;
  padding:.65rem .9rem;font-size:.78rem;color:var(--gold);line-height:1.55;margin-top:.5rem;display:flex;gap:.5rem}

/* EMPTY */
.empty{text-align:center;padding:3rem 1rem;color:var(--t3);font-size:.9rem}

/* RESPONSIVE */
@media(max-width:600px){
  .hdr-inner{padding:.75rem 1rem}
  .controls{padding:0 1rem}
  .grid{grid-template-columns:1fr}
  .info-grid{grid-template-columns:1fr 1fr}
}
</style>

let filterKey='all';

function posGroup(pos){return pos;}
function paColor(pa){if(pa>=75)return'#3fb950';if(pa>=65)return'#58a6ff';if(pa>=55)return'#f0a828';return'#8b949e';}
function barColor(v){if(v>=68)return'#3fb950';if(v>=55)return'#58a6ff';if(v>=44)return'#f0a828';return'#f85149';}
function emoji(pos){if(pos==='GK')return'🧤';if(pos==='DEF')return'🛡️';if(pos==='MID')return'🎯';return'⚡';}
function badgeClass(pos){return'b-'+pos;}

function setFilter(el,val){
  document.querySelectorAll('.pill').forEach(p=>p.classList.remove('on'));
  el.classList.add('on');filterKey=val;render();
}

function render(){
  const q=document.getElementById('srch').value.toLowerCase();
  const pos=document.getElementById('pos-sel').value;
  const sort=document.getElementById('sort-sel').value;
  let d=DATA.filter(p=>{
    if(q&&![p.name,p.club,p.nat].some(s=>s.toLowerCase().includes(q)))return false;
    if(pos&&p.pos!==pos)return false;
    if(filterKey==='free'&&p.valNum>0)return false;
    if(filterKey==='wk'&&p.age>18)return false;
    if(filterKey==='mid'&&p.pos!=='MID')return false;
    if(filterKey==='def'&&p.pos!=='DEF')return false;
    if(filterKey==='att'&&p.pos!=='ATT')return false;
    return true;
  });
  if(sort==='pa')d.sort((a,b)=>b.pa-a.pa);
  else if(sort==='ca')d.sort((a,b)=>b.ca-a.ca);
  else if(sort==='age')d.sort((a,b)=>a.age-b.age);
  else if(sort==='val')d.sort((a,b)=>a.valNum-b.valNum);
  else d.sort((a,b)=>a.name.localeCompare(b.name));
  document.getElementById('count-lbl').textContent=d.length+' joueur'+(d.length>1?'s')+'';
  const g=document.getElementById('grid');
  if(!d.length){g.innerHTML='<div class="empty">Aucun joueur trouvé.</div>';return;}
  g.innerHTML=d.map(p=>cardHTML(p)).join('');
}

function cardHTML(p){
  const pc=paColor(p.pa);
  const bars=Object.entries(p.attrs).map(([k,v])=>
    `<div class="bar-row"><span class="bar-lbl">${k}</span><div class="bar-bg"><div class="bar-fill" style="width:${v}%;background:${barColor(v)}"></div></div><span class="bar-val" style="color:${barColor(v)}">${v}</span></div>`
  ).join('');
  const valBadge=p.valNum===0?`<span class="badge b-free">🆓 Gratuit</span>`:`<span class="badge b-val">💰 ${p.val}</span>`;
  const randBadge=p.paRand?`<span class="badge b-rand">PA ±</span>`:'';
  return `<div class="card" onclick="openModal(${encodeIdx(p)})">
    <div class="card-accent" style="background:${pc}"></div>
    <div class="card-top">
      <div class="card-av" style="background:${pc}18;border-color:${pc}44">${emoji(p.pos)}</div>
      <div class="card-info">
        <div class="card-name">${p.name}</div>
        <div class="card-sub">${p.flag} ${p.nat} · ${p.club}</div>
        <div class="card-badges">
          <span class="badge ${badgeClass(p.pos)}">${p.posLabel.split('/')[0].trim()}</span>
          ${valBadge}${randBadge}
        </div>
      </div>
      <div class="card-pa">
        <div class="card-pa-v" style="color:${pc}">${p.pa}</div>
        <div class="card-pa-l">PA/100</div>
        <div class="card-pa-age">${p.age} ans</div>
      </div>
    </div>
    <div class="card-bars">${bars}</div>
    <div class="card-foot"><div class="card-tip">${p.tip}</div></div>
  </div>`;
}

const IDX=DATA.map((_,i)=>i);
function encodeIdx(p){return DATA.indexOf(p);}

document.getElementById('grid').addEventListener('click',e=>{
  const card=e.target.closest('.card');
  if(!card)return;
  const idx=parseInt(card.getAttribute('onclick').match(/\d+/)[0]);
  openModal(idx);
});

// Override: use idx not obj
document.getElementById('grid').innerHTML='';
function openModal(idx){
  const p=typeof idx==='number'?DATA[idx]:idx;
  if(!p)return;
  const pc=paColor(p.pa);
  const bars=Object.entries(p.attrs).map(([k,v])=>
    `<div class="mbar-row"><span class="mbar-lbl">${k}</span><div class="mbar-bg"><div class="mbar-fill" style="width:${v}%;background:${barColor(v)}"></div></div><span class="mbar-val" style="color:${barColor(v)}">${v}</span></div>`
  ).join('');
  const valBadge=p.valNum===0?`<span class="badge b-free">🆓 Gratuit</span>`:`<span class="badge b-val">💰 ${p.val}</span>`;
  document.getElementById('modal-inner').innerHTML=`
    <div class="modal-head">
      <div class="modal-av" style="background:${pc}18;border-color:${pc}44">${emoji(p.pos)}</div>
      <div class="modal-hinfo">
        <div class="modal-name">${p.name}</div>
        <div class="modal-sub">${p.flag} ${p.nat} · ${p.club}</div>
        <div class="modal-hdg">
          <span class="badge ${badgeClass(p.pos)}">${p.posLabel}</span>
          ${valBadge}
          ${p.paRand?'<span class="badge b-rand">PA aléatoire</span>':''}
        </div>
      </div>
      <button class="modal-close" onclick="document.getElementById('modal').classList.remove('on')">✕</button>
    </div>
    <div class="modal-body">
      <div class="sec-t">Informations</div>
      <div class="info-grid">
        <div class="info-cell"><div class="info-lbl">Âge</div><div class="info-val">${p.age} ans</div></div>
        <div class="info-cell"><div class="info-lbl">Taille</div><div class="info-val">${p.height}</div></div>
        <div class="info-cell"><div class="info-lbl">Pied fort</div><div class="info-val">${p.foot}</div></div>
        <div class="info-cell"><div class="info-lbl">Contrat</div><div class="info-val">${p.contract}</div></div>
        <div class="info-cell"><div class="info-lbl">Salaire</div><div class="info-val">${p.wage}</div></div>
        <div class="info-cell"><div class="info-lbl">Valeur</div><div class="info-val">${p.val}</div></div>
        <div class="info-cell"><div class="info-lbl">Note actuelle (CA)</div><div class="info-val" style="color:${barColor(p.ca)}">${p.ca} / 100</div></div>
        <div class="info-cell"><div class="info-lbl">Potentiel (PA)</div><div class="info-val" style="color:${pc}">${p.pa} / 100${p.paRand?' ±':''}</div></div>
      </div>
      <div class="sec-t">Attributs</div>
      <div class="modal-bars">${bars}</div>
      <div class="sec-t">Profil</div>
      <div class="desc-box">${p.desc}</div>
      <div class="tip-box">💡 ${p.tip}</div>
    </div>`;
  document.getElementById('modal').classList.add('on');
}

function closeModal(e){if(e.target.id==='modal')document.getElementById('modal').classList.remove('on');}
document.addEventListener('keydown',e=>{if(e.key==='Escape')document.getElementById('modal').classList.remove('on');});

render();
</script>
</body>
</html>
