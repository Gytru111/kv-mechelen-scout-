function paColor(pa){if(pa>=75)return'#4CAF50';if(pa>=65)return'#5B8DEF';if(pa>=55)return'#D4A843';return'#888';}

function emo(pos){return pos==='GK'?'G':pos==='DEF'?'D':pos==='MID'?'M':'A';}

function formatNumber(n){return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g,' ');}
function parseWage(w){if(!w||w==='Libre')return 0;var m=w.replace(/\s/g,'').match(/(\d+)/);return m?parseInt(m[1]):0;}

function contractMonths(contract){
  if(!contract||contract==='Libre')return-1;
  var months={janvier:0,février:1,mars:2,avril:3,mai:4,juin:5,juillet:6,août:7,septembre:8,octobre:9,novembre:10,décembre:11};
  var m=-1,y=-1;
  for(var key in months){if(contract.toLowerCase().indexOf(key)>=0){m=months[key];break;}}
  if(m<0){var short={janv:0,'févr':1,avr:3,juil:6,sept:8,oct:9,nov:10,'déc':11};for(var k in short){if(contract.toLowerCase().indexOf(k)>=0){m=short[k];break;}}}
  var ym=contract.match(/(\d{4})/);if(ym)y=parseInt(ym[1]);
  if(y<0)return-1;if(m<0)m=5;
  var now=new Date(),ce=new Date(y,m,1);
  return(ce.getFullYear()-now.getFullYear())*12+(ce.getMonth()-now.getMonth());
}
function contractBadgeHTML(contract){
  var months=contractMonths(contract);
  if(months<0)return'<span class="contract-badge cb-libre">Libre</span>';
  if(months<6)return'<span class="contract-badge cb-red">'+months+' mois</span>';
  if(months<18)return'<span class="contract-badge cb-yellow">'+months+' mois</span>';
  return'<span class="contract-badge cb-green">'+months+' mois</span>';
}

function updateBudget(){

  document.getElementById('bt-total-val').textContent=tv>0?formatNumber(tv)+' €':'0 €';
  document.getElementById('bt-total-wage').textContent=tw>0?formatNumber(tw)+' €/mois':'0 €/mois';
}

function drawCompareRadar(a1,a2,size){
  var keys=Object.keys(a1),n=keys.length,cx=size/2,cy=size/2,r=(size/2)*.68;
  function gp(a){return keys.map(function(k,i){var v=a[k]/100,an=(Math.PI*2/n)*i-Math.PI/2;return[cx+Math.cos(an)*r*v,cy+Math.sin(an)*r*v];});}
  var bgPts=keys.map(function(_,i){var an=(Math.PI*2/n)*i-Math.PI/2;return[cx+Math.cos(an)*r,cy+Math.sin(an)*r];});
  var pts1=gp(a1),pts2=gp(a2);
  var rings='';
  [.25,.5,.75,1].forEach(function(s){var rp=bgPts.map(function(p){return[(p[0]-cx)*s+cx,(p[1]-cy)*s+cy];});rings+='<polygon points="'+rp.map(function(p){return p.join(',');}).join(' ')+'" fill="none" stroke="rgba(255,255,255,.06)" stroke-width=".5"/>';});
  var axes=bgPts.map(function(p){return'<line x1="'+cx+'" y1="'+cy+'" x2="'+p[0]+'" y2="'+p[1]+'" stroke="rgba(255,255,255,.06)" stroke-width=".5"/>';}).join('');
  var labels=keys.map(function(k,i){var an=(Math.PI*2/n)*i-Math.PI/2,lx=cx+Math.cos(an)*(r+16),ly=cy+Math.sin(an)*(r+16);return'<text x="'+lx+'" y="'+ly+'" text-anchor="middle" dominant-baseline="middle" fill="#606070" font-size="7" font-family="Inter">'+escapeHTML(k)+'</text>';}).join('');

  var a2s='<polygon points="'+pts2.map(function(p){return p.join(',');}).join(' ')+'" fill="rgba(91,141,239,.1)" stroke="#5B8DEF" stroke-width="1.5"/>';
  var d1=pts1.map(function(p){return'<circle cx="'+p[0]+'" cy="'+p[1]+'" r="2" fill="#E8622C"/>';}).join('');
  var d2=pts2.map(function(p){return'<circle cx="'+p[0]+'" cy="'+p[1]+'" r="2" fill="#5B8DEF"/>';}).join('');
  return'<svg width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'">'+rings+axes+labels+a1s+a2s+d1+d2+'</svg>';
}

function drawProgressionCurve(fm25,ca,pa,age){
  if(!fm25)return'';
  var w=320,h=120,pad={t:18,r:15,b:22,l:32};
  var pw=w-pad.l-pad.r,ph=h-pad.t-pad.b;
  var vals=[fm25.ca,fm25.pa,ca,pa];
  var mn=Math.min.apply(null,vals)-10,mx=Math.max.apply(null,vals)+10;
  var x1=pad.l,x2=pad.l+pw*.45,x3=pad.l+pw;
  function sy(v){return pad.t+ph-(v-mn)/(mx-mn)*ph;}
  var ca1=sy(fm25.ca),ca2=sy(ca),pa1=sy(fm25.pa),pa2=sy(pa),paT=sy(pa);
  var gridLines='';
  for(var i=0;i<=4;i++){
    var gy=pad.t+ph*(i/4);
    var gv=Math.round(mx-(mx-mn)*(i/4));
    gridLines+='<line x1="'+pad.l+'" y1="'+gy+'" x2="'+pad.l+pw+'" y2="'+gy+'" stroke="rgba(255,255,255,.04)" stroke-width=".5"/>';
    gridLines+='<text x="'+(pad.l-4)+'" y="'+(gy+3)+'" text-anchor="end" fill="#606070" font-size="7" font-family="JetBrains Mono">'+gv+'</text>';
  }
  var paLine='<line x1="'+x1+'" y1="'+pa1+'" x2="'+x3+'" y2="'+pa2+'" stroke="rgba(245,209,48,.25)" stroke-width="1" stroke-dasharray="4,3"/>';
  var paTarget='<line x1="'+x2+'" y1="'+pa2+'" x2="'+x3+'" y2="'+paT+'" stroke="rgba(245,209,48,.35)" stroke-width="1.5" stroke-dasharray="6,3"/>';
  var caLine='<line x1="'+x1+'" y1="'+ca1+'" x2="'+x2+'" y2="'+ca2+'" stroke="#C8102E" stroke-width="2.5" stroke-linecap="round"/>';
  var caDot1='<circle cx="'+x1+'" cy="'+ca1+'" r="3.5" fill="#C8102E" stroke="#0d0e12" stroke-width="1.5"/>';
  var caDot2='<circle cx="'+x2+'" cy="'+ca2+'" r="4" fill="#C8102E" stroke="#0d0e12" stroke-width="1.5"/>';
  var paDot1='<circle cx="'+x1+'" cy="'+pa1+'" r="3" fill="var(--kv-yellow)" stroke="#0d0e12" stroke-width="1.5"/>';
  var paDot2='<circle cx="'+x2+'" cy="'+pa2+'" r="3.5" fill="var(--kv-yellow)" stroke="#0d0e12" stroke-width="1.5"/>';
  var paDotT='<circle cx="'+x3+'" cy="'+paT+'" r="3" fill="none" stroke="var(--kv-yellow)" stroke-width="1.5" stroke-dasharray="2,2"/>';
  var xLabels='<text x="'+x1+'" y="'+(h-4)+'" text-anchor="middle" fill="#606070" font-size="7" font-family="Inter">FM 25</text>'
    +'<text x="'+x2+'" y="'+(h-4)+'" text-anchor="middle" fill="#a0a0ac" font-size="7" font-family="Inter" font-weight="600">FM 26</text>'
    +'<text x="'+x3+'" y="'+(h-4)+'" text-anchor="middle" fill="#606070" font-size="7" font-family="Inter">PA max</text>';
  var caLabel='<text x="'+x2+'" y="'+(ca2-8)+'" text-anchor="middle" fill="#C8102E" font-size="8" font-weight="700" font-family="JetBrains Mono">'+ca+'</text>';
  var paLabel='<text x="'+x2+'" y="'+(pa2-8)+'" text-anchor="middle" fill="#F5D130" font-size="8" font-weight="700" font-family="JetBrains Mono">'+pa+'</text>';
  return'<svg width="'+w+'" height="'+h+'" viewBox="0 0 '+w+' '+h+'" style="display:block;margin:0 auto">'+gridLines+paLine+paTarget+caLine+caDot1+caDot2+paDot1+paDot2+paDotT+xLabels+caLabel+paLabel+'</svg>';
}

        +Object.keys(p.attrs).map(function(k){var v=p.attrs[k];return'<div class="rl-row"><span class="rl-dot" style="background:'+barColor(v)+';color:'+barColor(v)+'"></span><span class="rl-lbl">'+escapeHTML(k)+'</span><span class="rl-val" style="color:'+barColor(v)+'">'+v+'</span></div>';}).join('')
      +'</div></div>'
      +'<div style="font-size:.58rem;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.12em;margin-bottom:.5rem">Attributs détaillés</div>'
      +'<div class="attrs-grid">'+attrCells+'</div>'
      +evoHTML+statsHTML+careerHTML
      +'<div class="info-table">'
        +'<div class="it-row"><span class="it-lbl">Pied fort</span><span class="it-val">'+escapeHTML(p.foot)+'</span></div>'
        +'<div class="it-row"><span class="it-lbl">Contrat</span><span class="it-val">'+escapeHTML(p.contract)+'</span></div>'
        +'<div class="it-row"><span class="it-lbl">Salaire</span><span class="it-val">'+escapeHTML(p.wage)+'</span></div>'
        +'<div class="it-row"><span class="it-lbl">Valeur marchande</span><span class="it-val" style="color:'+pc+'">'+escapeHTML(p.val)+'</span></div>'
        +'<div class="it-row"><span class="it-lbl">Nationalité</span><span class="it-val">'+p.flag+' '+escapeHTML(p.nat)+'</span></div>'
        +'<div class="it-row"><span class="it-lbl">Taille</span><span class="it-val">'+escapeHTML(p.height)+'</span></div>'
      +'</div>'
      +'<div class="scout-report"><div class="sr-header"><span class="sr-title">Rapport scout</span></div><div class="sr-text">'+escapeHTML(p.desc)+'</div></div>'
      +'<div class="tip-box">'+escapeHTML(p.tip)+'</div>'
      +'<div class="tag-section"><div class="tag-section-header">Étiquettes</div><div class="tag-options">'+tagOptsHTML+'</div></div>'
      +'<div class="note-section">'
        +'<div class="note-header">Notes personnelles</div>'
        +'<textarea class="note-ta" id="note-ta-'+id+'" placeholder="Ajoutez vos observations…">'+escapeHTML(pn)+'</textarea>'
        +'<div class="interest-row"><span class="interest-lbl">Statut</span><div class="int-opts">'
          +'<span class="int-opt'+intSel('watch')+'" onclick="setInterest('+id+',\'watch\')">Suivre</span>'
          +'<span class="int-opt'+intSel('target')+'" onclick="setInterest('+id+',\'target\')">Cible</span>'
          +'<span class="int-opt'+intSel('sign')+'" onclick="setInterest('+id+',\'sign\')">Signer</span>'
          +'<span class="int-opt'+intSel('pass')+'" onclick="setInterest('+id+',\'pass\')">Passer</span>'
          +'<span class="int-opt'+intSel('dropped')+'" onclick="setInterest('+id+',\'dropped\')">Trop cher</span>'
        +'</div></div>'
        +'<div class="drop-row" id="drop-row-'+id+'" style="display:'+(pi==='dropped'?'flex':'none')+';align-items:center;gap:.6rem;margin-top:.5rem">'
          +'<span class="interest-lbl">Raison</span>'
          +'<input class="drop-input" id="drop-'+id+'" type="text" placeholder="Ex: Prix trop élevé…" value="'+escapeHTML(dropReasons[id]||'')+'" style="flex:1;background:var(--s3);border:1px solid rgba(232,145,58,.15);border-radius:8px;padding:.35rem .7rem;color:#E8913A;font-size:.7rem;font-family:Inter,sans-serif;outline:none">'
        +'</div>'
        +'<div class="note-foot"><button class="btn-save" onclick="saveNote('+id+')" aria-label="Enregistrer">Enregistrer</button></div>'
      +'</div>'
    +'</div>';
  document.getElementById('panel-bg').classList.add('on');
  document.body.style.overflow='hidden';
  setTimeout(function(){var cl=document.querySelector('.panel-close');if(cl)cl.focus();},100);
}

function closePanel(){
  document.getElementById('panel-bg').classList.remove('on');
  document.body.style.overflow='';
  if(lastFocusedCard){lastFocusedCard.focus();lastFocusedCard=null;}
}
function closePanelBg(e){if(e.target===document.getElementById('panel-bg'))closePanel();}
function saveNote(id){var ta=document.getElementById('note-ta-'+id);if(ta)notes[id]=ta.value;var dr=document.getElementById('drop-'+id);if(dr)dropReasons[id]=dr.value;try{localStorage.setItem('kvscout_notes',JSON.stringify(notes));localStorage.setItem('kvscout_dropReasons',JSON.stringify(dropReasons));}catch(e){}}
function setInterest(id,val){if(interests[id]===val){delete interests[id];}else{interests[id]=val;}try{localStorage.setItem('kvscout_interests',JSON.stringify(interests));}catch(e){}openPanel(id);render();}

function toggleTag(id,tagId){
  if(!tags[id])tags[id]=[];
  var idx=tags[id].indexOf(tagId);
  if(idx>=0)tags[id].splice(idx,1);else tags[id].push(tagId);
  try{localStorage.setItem('kvscout_tags',JSON.stringify(tags));}catch(e){}
  openPanel(id);render();
}

function toggleCompare(id){
  var idx=compareList.indexOf(id);
  if(idx>=0){compareList.splice(idx,1);}
  else{if(compareList.length>=2)compareList.shift();compareList.push(id);}
  updateCompareBar();render();
}
function updateCompareBar(){
  var bar=document.getElementById('cmp-bar');
  if(compareList.length===0){bar.classList.remove('on');return;}
  bar.classList.add('on');
  for(var i=0;i<2;i++){
    var slot=document.getElementById('cmp-'+i),name=document.getElementById('cmp-n'+i);
    if(compareList[i]!==undefined){
      slot.classList.add('filled');name.textContent=DATA[compareList[i]].name;
    }else{slot.classList.remove('filled');name.textContent='Joueur '+(i+1);}
  }
}
function clearCompare(){compareList=[];document.getElementById('cmp-bar').classList.remove('on');render();}

function openCompare(){
  if(compareList.length<2)return;
  var p1=DATA[compareList[0]],p2=DATA[compareList[1]];
  var radarSvg=drawCompareRadar(p1.attrs,p2.attrs,280);
  var attrKeys=Object.keys(p1.attrs);
  var tableRows=attrKeys.map(function(k){
    var v1=p1.attrs[k],v2=p2.attrs[k];
    var w=v1>v2?'c1':v2>v1?'c2':'tie';
    return'<tr><td>'+escapeHTML(k)+'</td><td class="'+(w==='c1'?'cmp-win':'')+'">'+v1+'</td><td class="'+(w==='c2'?'cmp-win':'')+'">'+v2+'</td></tr>';
  }).join('');
  var infoRows=[
    ['CA',p1.ca,p2.ca],['PA',p1.pa,p2.pa],['Âge',p1.age,p2.age],
    ['Valeur',p1.val,p2.val],['Taille',p1.height,p2.height],['Pied',p1.foot,p2.foot],['Contrat',p1.contract,p2.contract],['Salaire',p1.wage,p2.wage]
  ];
  var infoHTML=infoRows.map(function(r){
    var w=typeof r[1]==='number'&&typeof r[2]==='number'?(r[1]>r[2]?'c1':r[2]>r[1]?'c2':'tie'):'tie';
    return'<tr><td>'+escapeHTML(r[0])+'</td><td class="'+(w==='c1'?'cmp-win':'')+'">'+escapeHTML(String(r[1]))+'</td><td class="'+(w==='c2'?'cmp-win':'')+'">'+escapeHTML(String(r[2]))+'</td></tr>';
  }).join('');
  document.getElementById('compare-panel').innerHTML=
    '<div class="cmp-header"><div class="cmp-header-title">'+escapeHTML(p1.name)+' vs '+escapeHTML(p2.name)+'</div><button class="panel-close" onclick="closeCompare()" aria-label="Fermer">✕</button></div>'
    +'<div class="cmp-body">'
      +'<div class="cmp-radar-row"><div class="cmp-radar-svg">'+radarSvg+'</div><div class="cmp-radar-legend">'
        +'<div><div class="cmp-legend-hdr" style="color:#E8622C">'+escapeHTML(p1.name)+'</div>'
        +attrKeys.map(function(k){return'<div class="cmp-legend-row"><span class="cmp-legend-dot" style="background:#E8622C"></span><span class="cmp-legend-lbl">'+escapeHTML(k)+'</span><span class="cmp-legend-v1" style="color:#E8622C">'+p1.attrs[k]+'</span></div>';}).join('')+'</div>'
        +'<div style="margin-top:.5rem"><div class="cmp-legend-hdr" style="color:#5B8DEF">'+escapeHTML(p2.name)+'</div>'
        +attrKeys.map(function(k){return'<div class="cmp-legend-row"><span class="cmp-legend-dot" style="background:#5B8DEF"></span><span class="cmp-legend-lbl">'+escapeHTML(k)+'</span><span class="cmp-legend-v2" style="color:#5B8DEF">'+p2.attrs[k]+'</span></div>';}).join('')+'</div>'
      +'</div></div>'
      +'<div style="font-size:.58rem;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.12em;margin-bottom:.5rem">Comparaison des attributs</div>'
      +'<table class="cmp-table"><thead><tr><th>Attribut</th><th style="color:#E8622C">'+escapeHTML(p1.name)+'</th><th style="color:#5B8DEF">'+escapeHTML(p2.name)+'</th></tr></thead><tbody>'+tableRows+'</tbody></table>'
      +'<div style="font-size:.58rem;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.12em;margin-bottom:.5rem">Informations</div>'
      +'<table class="cmp-table"><thead><tr><th>Info</th><th style="color:#E8622C">'+escapeHTML(p1.name)+'</th><th style="color:#5B8DEF">'+escapeHTML(p2.name)+'</th></tr></thead><tbody>'+infoHTML+'</tbody></table>'
    +'</div>';
  document.getElementById('compare-bg').classList.add('on');
  document.body.style.overflow='hidden';
}
function closeCompare(){document.getElementById('compare-bg').classList.remove('on');document.body.style.overflow='';}
function closeCompareBg(e){if(e.target===document.getElementById('compare-bg'))closeCompare();}

function populateNations(){var nats=[...new Set(DATA.map(function(p){return p.nat;}))].filter(function(n){return n!=='—';}).sort();var sel=document.getElementById('nat-sel');nats.forEach(function(n){var o=document.createElement('option');o.value=n;o.textContent=n;sel.appendChild(o);});}

document.querySelectorAll('.ppill').forEach(function(el){
  el.addEventListener('keydown',function(e){if(e.key==='Enter'||e.key===' '){e.preventDefault();el.click();}});
  el.addEventListener('click',function(){document.querySelectorAll('.ppill').forEach(function(p){p.classList.remove('on');});el.classList.add('on');filterPos=el.dataset.pos;render();});
});

var debounceTimer;
document.getElementById('srch').addEventListener('input',function(){clearTimeout(debounceTimer);debounceTimer=setTimeout(render,200);});
document.getElementById('sort-sel').addEventListener('change',render);
document.getElementById('nat-sel').addEventListener('change',function(){filterNat=this.value;render();});
document.getElementById('val-sel').addEventListener('change',function(){filterVal=parseInt(this.value);render();});
document.getElementById('int-sel').addEventListener('change',function(){filterInt=this.value;render();});
document.getElementById('foot-sel').addEventListener('change',function(){filterFoot=this.value;render();});
document.getElementById('age-range').addEventListener('input',function(){filterAge=parseInt(this.value);document.getElementById('age-lbl').textContent=this.value;render();});
document.getElementById('pa-range').addEventListener('input',function(){filterPa=parseInt(this.value);document.getElementById('pa-lbl').textContent=this.value;render();});

function resetFilters(){
  filterPos='all';filterNat='all';filterFoot='all';filterInt='all';filterAge=35;filterPa=0;filterVal=999999999;activeTab='active';
  document.getElementById('srch').value='';document.getElementById('sort-sel').value='pa';document.getElementById('nat-sel').value='all';
  document.getElementById('val-sel').value='999999999';document.getElementById('int-sel').value='all';document.getElementById('foot-sel').value='all';
  document.getElementById('age-range').value=35;document.getElementById('age-lbl').textContent=35;document.getElementById('pa-range').value=0;document.getElementById('pa-lbl').textContent=0;
  document.querySelectorAll('.ppill').forEach(function(p){p.classList.remove('on');});document.querySelector('.ppill[data-pos="all"]').classList.add('on');
  document.getElementById('tab-active').classList.add('on');document.getElementById('tab-dropped').classList.remove('on');render();
}
function setView(v){viewMode=v;document.getElementById('vg').classList.toggle('on',v==='grid');document.getElementById('vl').classList.toggle('on',v==='list');render();}
function setTab(t){activeTab=t;document.getElementById('tab-active').classList.toggle('on',t==='active');document.getElementById('tab-dropped').classList.toggle('on',t==='dropped');render();}

function exportData(){
  var exp={notes:notes,interests:interests,dropReasons:dropReasons,tags:tags};
  var blob=new Blob([JSON.stringify(exp,null,2)],{type:'application/json'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;a.download='kvscout-export-'+new Date().toISOString().slice(0,10)+'.json';
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}
function importData(e){
  var file=e.target.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=function(ev){
    try{
      var imp=JSON.parse(ev.target.result);
      if(imp.notes)for(var k in imp.notes)notes[k]=imp.notes[k];
      if(imp.interests)for(var k in imp.interests)interests[k]=imp.interests[k];
      if(imp.dropReasons)for(var k in imp.dropReasons)dropReasons[k]=imp.dropReasons[k];
      if(imp.tags)for(var k in imp.tags)tags[k]=imp.tags[k];
      localStorage.setItem('kvscout_notes',JSON.stringify(notes));
      localStorage.setItem('kvscout_interests',JSON.stringify(interests));
      localStorage.setItem('kvscout_dropReasons',JSON.stringify(dropReasons));
      localStorage.setItem('kvscout_tags',JSON.stringify(tags));
      render();
    }catch(err){alert('Erreur lors de l\'import : fichier invalide.');}
  };
  reader.readAsText(file);
  e.target.value='';
}

function toggleSidebar(){
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebar-overlay').classList.toggle('on');
}
function closeSidebar(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('on');
}

var tiltRaf=null,tiltX=0,tiltY=0;
document.addEventListener('mousemove',function(e){
  tiltX=e.clientX;tiltY=e.clientY;
  if(!tiltRaf){
    tiltRaf=requestAnimationFrame(function(){
      tiltRaf=null;
      var el=document.elementFromPoint(tiltX,tiltY);
      var card=el?el.closest('.card'):null;
      document.querySelectorAll('.card').forEach(function(c){if(c!==card)c.style.transform='';});
      if(card){
        var r=card.getBoundingClientRect();
        var x=(tiltX-r.left)/r.width-.5,y=(tiltY-r.top)/r.height-.5;
        card.style.transform='translateY(-6px) rotateX('+(-y*6)+'deg) rotateY('+(x*6)+'deg)';
      }
    });
  }
});
document.addEventListener('mouseleave',function(){document.querySelectorAll('.card').forEach(function(c){c.style.transform='';});});

document.getElementById('panel-bg').addEventListener('keydown',function(e){
  if(e.key!=='Tab')return;
  var panel=document.getElementById('panel');
  var focusable=panel.querySelectorAll('button, input, select, textarea, [tabindex]:not([tabindex="-1"])');
  if(!focusable.length)return;
  var first=focusable[0],last=focusable[focusable.length-1];
  if(e.shiftKey){if(document.activeElement===first){e.preventDefault();last.focus();}}
  else{if(document.activeElement===last){e.preventDefault();first.focus();}}
});

document.addEventListener('keydown',function(e){
  if(e.key==='Escape'){
    if(document.getElementById('compare-bg').classList.contains('on'))closeCompare();
    else if(document.getElementById('panel-bg').classList.contains('on'))closePanel();
  }
});

populateNations();
render();
</script>
</body>
